# Restream_Plus — nginx + nginx-rtmp config
# Authoritative shape: Phase 10 design memo §J.
# Threat model + behavior: ADR-0003.
#
# CRITICAL invariants (CI greps to verify):
#   - log_format `redacted`/`compact` only (no `combined`/`main`)
#   - error_log at `warn` level (not notice/info/debug)
#   - on_publish URL hardcodes http://127.0.0.1:8000/internal/rtmp/publish
#     (coupled to app/config.py::bind_port — if bind_port changes, change here)
#   - allow play 127.0.0.1; deny play all  (threat-model load-bearing)
#   - max_streams 1 (one publish at a time)
#   - play_restart off (control plane owns reconnect)
#   - no `push` directives anywhere (fan-out lives in app/fanout/)

user restream;
worker_processes 1;
pid /run/nginx/nginx.pid;
error_log /data/logs/nginx-error.log warn;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Phase 10 §I — redact URL path under /live/<key> in access logs.
    # `map` is the cleanest in-tree workaround for "regex-substitute a
    # path segment" since nginx's log_format lacks regex substitution.
    map $uri $safe_uri {
        ~^/live/.+  /live/<redacted>;
        default     $uri;
    }
    log_format redacted '$remote_addr - - [$time_local] '
                        '"$request_method $safe_uri $server_protocol" '
                        '$status $body_bytes_sent';

    # No HTTP access_log by default — the panel + internal webhooks are
    # served by FastAPI on :8000, not by nginx. The stub-status server
    # below is loopback-only and intentionally silent.
    access_log off;

    sendfile        on;
    keepalive_timeout 65;

    # Diagnostic stub-status — loopback only. Useful for
    # `docker exec restream-plus curl http://127.0.0.1:8888/nginx_status`
    # when investigating "nginx looks wedged" incidents.
    server {
        listen 127.0.0.1:8888;
        server_name localhost;

        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            deny all;
        }
    }
}

rtmp {
    # Phase 10 §I — the leaky variable is $name (= ingest key). Hardcode
    # "REDACTED" in the log line so it never reaches disk.
    log_format compact '$remote_addr [$time_local] $command '
                       'app="$app" name="REDACTED" '
                       'bytes_in=$bytes_received bytes_out=$bytes_sent '
                       'time=$session_time';
    access_log /data/logs/nginx-access.log compact;

    server {
        listen 1935;
        chunk_size 4096;
        max_streams 1;  # exactly one concurrent publish per connection (rtmp-module server-level directive — NOT allowed inside `application`)

        application live {
            live on;
            record off;

            # Publish gate: ANY publish allowed at nginx layer.
            # Real auth is in the on_publish webhook (checks ingest
            # key vs settings.ingest_key_current with constant-time
            # compare; rejects with 403 if mismatch).
            allow publish all;

            # Play gate: only loopback ffmpeg workers may pull.
            # External plays are denied — ingest only per ADR-0003.
            allow play 127.0.0.1;
            deny play all;

            # nginx-rtmp POSTs application/x-www-form-urlencoded with
            #   name=<stream>&app=live&addr=<peer>&clientid=<n>&flashver=<>&...
            # The FastAPI handler in app/api/internal_rtmp.py reads `name`
            # via Form(alias="name"). Do NOT switch to JSON — the handler
            # does not accept application/json.
            #
            # COUPLING: the host:port `http://127.0.0.1:8000` matches
            # app/config.py::AppSettings.bind_port. If bind_port ever
            # changes, update both files together. See Phase 10 §J I-J3.
            on_publish      http://127.0.0.1:8000/internal/rtmp/publish;
            on_publish_done http://127.0.0.1:8000/internal/rtmp/publish_done;

            idle_streams        off;
            wait_key            on;
            drop_idle_publisher 10s;
            meta                copy;    # passthrough; no metadata rewrite
            play_restart        off;     # control plane owns reconnect (ADR-0003 circuit breaker)

            # NO `push` directives. Fan-out is owned by the control plane
            # via per-target FFmpegWorker subprocesses. See ADR-0003.
        }
    }
}
