# Restream_Plus — runtime dependency lock for the container image.
#
# Phase 10 design memo §A — used by the backend-builder stage:
#   pip install --no-cache-dir --no-deps -r /tmp/requirements.lock
#
# The --no-deps flag means this list MUST be exhaustive (every
# transitive dep listed explicitly). Generated from the development
# venv via `pip freeze` then filtered to drop test/lint-only packages
# (pytest, ruff, mypy, hypothesis, coverage, librt, Pygments).
#
# Update procedure:
#   1. Bump a top-level dep in pyproject.toml.
#   2. Re-resolve in the dev venv: `pip install -e ".[dev]" --upgrade`.
#   3. `pip freeze` and diff against this file.
#   4. Update the runtime entries here; leave dev-only out.
#   5. Verify the container still builds: `docker build .`.
#
# Phase 11 DEFER-OR-AMEND-4: replace this hand-curated file with
# pip-compile / uv lock output once we wire Renovate or Dependabot.

